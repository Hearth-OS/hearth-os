name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      # npm test is not run here: integration tests need DATABASE_URL, GHOST_DATABASE_URL,
      # Redis, and often the WunderGraph router — run `npm test` locally (see README).
