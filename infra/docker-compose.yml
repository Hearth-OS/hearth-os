version: "3.8"
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ../.env.local
    depends_on:
      - redis
