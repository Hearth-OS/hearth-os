# From repo root:  docker compose -f infra/docker-compose.yml --env-file .env up --build
# Compose overrides REDIS_URL so the API uses the local redis service (not a cloud host).
version: "3.8"
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      GHOST_DATABASE_URL: ${GHOST_DATABASE_URL}
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
